<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>retro terminal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="boot"><img src="https://win98icons.alexmeub.com/icons/png/computer_explorer-4.png"width="64">
    <h2 style="margin-top: 15px;">retro terminal tutorial</h2>
    <p>built by @0xmanidev</p>
    <button id="bootBtn" class="boot-btn" onclick="startOS()">start system</button>
    <div id="desktop">
        <div style="display: flex;flex-direction: column;">
            <div class="icon" id="terminalIcon"><img src="https://win98icons.alexmeub.com/icons/png/console_prompt-0.png">
            Terminal
            </div>
            <div class="icon" id="aboutIcon">
                <img src="https://win98icons.alexmeub.com/icons/png/help_book_cool-0.png">
                About
            </div>
            <div class="icon" id="instructionIcon">
                <img src="https://win98icons.alexmeub.com/icons/png/notepad-0.png">
                Manual
            </div>
        </div>

    </div>

    <script src="script.js"></script>
</div>
</body>
</html>
